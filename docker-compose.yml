services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      - notes-api
      - flag-manager
    ports:
      - "80:80"

  notes-api:
    build:
      context: .
      dockerfile: infra/docker/notes-api.Dockerfile
    environment:
      PORT: "3000"
    expose:
      - "3000"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  flag-manager:
    build:
      context: .
      dockerfile: infra/docker/flag-manager.Dockerfile
    depends_on:
      - redis
    environment:
      PORT: "3001"
      REDIS_URL: "redis://redis:6379"
    expose:
      - "3001"

  redis:
    image: redis:8.2.1-alpine3.22
    expose:
      - "6379"

  svc-x:
    image: busybox:1.36.1
    command: ["sh", "-c", "sleep infinity"]
    expose:
      - "8080"
    profiles:
      - future-services

  svc-y:
    image: busybox:1.36.1
    command: ["sh", "-c", "sleep infinity"]
    expose:
      - "8081"
    profiles:
      - future-services
