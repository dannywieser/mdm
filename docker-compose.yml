services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      notes-api:
        condition: service_healthy
      flag-manager:
        condition: service_healthy
      image-server:
        condition: service_healthy
      habit-tracker:
        condition: service_healthy
    ports:
      - "80:80"

  notes-api:
    build:
      context: .
      dockerfile: infra/docker/notes-api.Dockerfile
    environment:
      PORT: "3000"
      NOTES_ROOT: "/data/notes"
    expose:
      - "3000"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  flag-manager:
    build:
      context: .
      dockerfile: infra/docker/flag-manager.Dockerfile
    depends_on:
      - redis
    environment:
      PORT: "3001"
      REDIS_URL: "redis://redis:6379"
    expose:
      - "3001"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  habit-tracker:
    build:
      context: .
      dockerfile: infra/docker/habit-tracker.Dockerfile
    environment:
      PORT: "3003"
      NOTES_ROOT: "/data/notes"
    expose:
      - "3003"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  image-server:
    build:
      context: .
      dockerfile: infra/docker/image-server.Dockerfile
    depends_on:
      - imgproxy
      - redis
    environment:
      PORT: "3002"
      IMGPROXY_PATH_PREFIX: "/imgproxy"
      IMAGES_ROOT: "/data/images"
      REDIS_URL: "redis://redis:6379"
    expose:
      - "3002"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${IMAGES_ROOT:-./notes}:/data/images:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  imgproxy:
    image: darthsim/imgproxy:v3.31.0
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_QUALITY: "75"
      IMGPROXY_ENFORCE_WEBP: "true"
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${IMAGES_ROOT:-./notes}:/data/images:ro

  redis:
    image: redis:8.2.1-alpine3.22
    ports:
      - "127.0.0.1:6379:6379"
