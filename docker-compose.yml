services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      - notes-api
    ports:
      - "80:80"

  notes-api:
    build:
      context: .
      dockerfile: infra/docker/notes-api.Dockerfile
    environment:
      PORT: "3000"
    expose:
      - "3000"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  svc-x:
    image: busybox:1.36.1
    command: ["sh", "-c", "sleep infinity"]
    expose:
      - "8080"
    profiles:
      - future-services

  svc-y:
    image: busybox:1.36.1
    command: ["sh", "-c", "sleep infinity"]
    expose:
      - "8081"
    profiles:
      - future-services
