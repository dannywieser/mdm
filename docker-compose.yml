services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      - notes-api
      - flag-manager
      - image-server
    ports:
      - "80:80"

  notes-api:
    build:
      context: .
      dockerfile: infra/docker/notes-api.Dockerfile
    environment:
      PORT: "3000"
    expose:
      - "3000"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  flag-manager:
    build:
      context: .
      dockerfile: infra/docker/flag-manager.Dockerfile
    depends_on:
      - redis
    environment:
      PORT: "3001"
      REDIS_URL: "redis://redis:6379"
    expose:
      - "3001"
    volumes:
      - ./app.config.json:/app/app.config.json:ro

  image-server:
    build:
      context: .
      dockerfile: infra/docker/image-server.Dockerfile
    depends_on:
      - imgproxy
    environment:
      PORT: "3002"
      IMGPROXY_PATH_PREFIX: "/imgproxy"
      IMAGES_ROOT: "/data/images"
    expose:
      - "3002"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${IMAGES_ROOT:-./notes}:/data/images:ro

  imgproxy:
    image: darthsim/imgproxy:v3.31.0
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/"
      IMGPROXY_USE_ETAG: "true"
    expose:
      - "8080"
    volumes:
      - ${IMAGES_ROOT:-./notes}:/data/images:ro

  redis:
    image: redis:8.2.1-alpine3.22
    ports:
      - "127.0.0.1:6379:6379"
