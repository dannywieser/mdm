services:
  web:
    restart: unless-stopped
    image: ghcr.io/dannywieser/mdm-web:${MDM_IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=mdm"
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      notes-api:
        condition: service_healthy
      flag-manager:
        condition: service_healthy
      image-server:
        condition: service_healthy
      habit-tracker:
        condition: service_healthy
      stats-service:
        condition: service_healthy
    ports:
      - "80:80"

  notes-api:
    restart: unless-stopped
    image: ghcr.io/dannywieser/mdm-notes-api:${MDM_IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=mdm"
    build:
      context: .
      dockerfile: infra/docker/notes-api.Dockerfile
    environment:
      APP_CONFIG_PATH: "/app/app.config.json"
      PORT: "3000"
      NOTES_ROOT: "/data/notes"
    expose:
      - "3000"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  flag-manager:
    restart: unless-stopped
    image: ghcr.io/dannywieser/mdm-flag-manager:${MDM_IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=mdm"
    build:
      context: .
      dockerfile: infra/docker/flag-manager.Dockerfile
    depends_on:
      - redis
    environment:
      APP_CONFIG_PATH: "/app/app.config.json"
      PORT: "3001"
      REDIS_URL: "redis://redis:6379"
    expose:
      - "3001"
    volumes:
      - ./app.config.json:/app/app.config.json:ro

  habit-tracker:
    restart: unless-stopped
    image: ghcr.io/dannywieser/mdm-habit-tracker:${MDM_IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=mdm"
    build:
      context: .
      dockerfile: infra/docker/habit-tracker.Dockerfile
    environment:
      APP_CONFIG_PATH: "/app/app.config.json"
      PORT: "3003"
      NOTES_ROOT: "/data/notes"
    expose:
      - "3003"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  stats-service:
    restart: unless-stopped
    image: ghcr.io/dannywieser/mdm-stats-service:${MDM_IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=mdm"
    build:
      context: .
      dockerfile: infra/docker/stats-service.Dockerfile
    environment:
      APP_CONFIG_PATH: "/app/app.config.json"
      PORT: "3004"
      NOTES_ROOT: "/data/notes"
    expose:
      - "3004"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  image-server:
    restart: unless-stopped
    image: ghcr.io/dannywieser/mdm-image-server:${MDM_IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=mdm"
    build:
      context: .
      dockerfile: infra/docker/image-server.Dockerfile
    depends_on:
      - imgproxy
      - redis
    environment:
      APP_CONFIG_PATH: "/app/app.config.json"
      PORT: "3002"
      IMGPROXY_PATH_PREFIX: "/imgproxy"
      NOTES_ROOT: "/data/notes"
      REDIS_URL: "redis://redis:6379"
    expose:
      - "3002"
    volumes:
      - ./app.config.json:/app/app.config.json:ro
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  imgproxy:
    restart: unless-stopped
    image: darthsim/imgproxy:v3.31.0
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_QUALITY: "85"
      IMGPROXY_ENFORCE_WEBP: "true"
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${NOTES_ROOT:-./notes}:/data/notes:ro

  redis:
    restart: unless-stopped
    image: redis:8.2.1-alpine3.22
    ports:
      - "127.0.0.1:6379:6379"

  # Opt-in: only starts when the "watchtower" profile is active (set
  # COMPOSE_PROFILES=watchtower in .env, or pass --profile watchtower).
  # Watches the 6 mdm-* app services above (each labeled
  # com.centurylinklabs.watchtower.enable=true and .scope=mdm) and pulls
  # + recreates them when a new image is published, so `docker compose
  # pull && docker compose up -d` never needs to run on a schedule.
  watchtower:
    profiles:
      - watchtower
    restart: unless-stopped
    # containrrr/watchtower was archived unmaintained in Dec 2025 and ships
    # a Docker client stuck on API 1.25, which newer Docker Engine releases
    # (v29+) reject outright ("client version 1.25 is too old"). This uses
    # nicholas-fedor/watchtower, the actively maintained fork the Watchtower
    # community has standardized on - a verified drop-in replacement with
    # the same env vars, labels, and volumes.
    # Pinned by digest (in addition to the human-readable tag) so the
    # container this host's Docker daemon actually pulls can't silently
    # change out from under a service with root-equivalent socket access.
    image: nickfedor/watchtower:1.19.0@sha256:c1dfdf27fe805dcfefe1cf048cee6960a511c097a99aa355b0bc4be6e6bb3bdf
    volumes:
      # Grants watchtower root-equivalent control over the host Docker
      # daemon (it can create/remove any container, not just the ones
      # it's scoped to watch) - this is inherent to how Watchtower
      # works, not something this label scoping can fully mitigate.
      # Only enable this profile on a host you trust the image for.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      # Restricts this instance to only the containers labeled
      # com.centurylinklabs.watchtower.scope=mdm (the 6 services above),
      # so another unrelated container on the same host that happens to
      # carry the enable label alone won't get swept up by this instance.
      WATCHTOWER_SCOPE: "mdm"
      WATCHTOWER_POLL_INTERVAL: "3600"
      WATCHTOWER_CLEANUP: "true"
