    <meta name="theme-color" content="#282a36" media="(prefers-color-scheme: dark)" />
    <title>mdm</title>
    <style>
      :root {
        --splash-bg: #fbf1c7;
        --splash-border: #d5c4a1;
        --splash-text: #3c3836;
        --splash-icon: #427b58;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --splash-bg: #282a36;
          --splash-border: #44475a;
          --splash-text: #f8f8f2;
          --splash-icon: #8be9fd;
        }
      }
      html,
      body {
        background: var(--splash-bg);
      }
      .splash-header {
        display: flex;
        align-items: center;
        height: 33px;
        padding: 0 16px;
        border-bottom: 1px solid var(--splash-border);
        color: var(--splash-text);
        font-family: 'Anonymous Pro', monospace;
        font-size: 14px;
        font-weight: 600;
      }
      .splash-icon {
        display: flex;
        justify-content: center;
        padding-top: 64px;
        color: var(--splash-icon);
      }
      @keyframes splash-rect {
        0% {
          stroke-dashoffset: 72;
          animation-timing-function: ease-out;
        }
        38% {
          stroke-dashoffset: 0;
          animation-timing-function: linear;
        }
        88% {
          stroke-dashoffset: 0;
          animation-timing-function: ease-in;
        }
        100% {
          stroke-dashoffset: 72;
        }
      }
      @keyframes splash-vline {
        0% {
          stroke-dashoffset: 22;
        }
        38% {
          stroke-dashoffset: 22;
          animation-timing-function: ease-out;
        }
        48% {
          stroke-dashoffset: 0;
          animation-timing-function: linear;
        }
        88% {
          stroke-dashoffset: 0;
          animation-timing-function: ease-in;
        }
        100% {
          stroke-dashoffset: 22;
        }
      }
      @keyframes splash-hline1 {
        0% {
          stroke-dashoffset: 6;
        }
        48% {
          stroke-dashoffset: 6;
          animation-timing-function: ease-out;
        }
        54% {
          stroke-dashoffset: 0;
          animation-timing-function: linear;
        }
        88% {
          stroke-dashoffset: 0;
          animation-timing-function: ease-in;
        }
        100% {
          stroke-dashoffset: 6;
        }
      }
      @keyframes splash-hline2 {
        0% {
          stroke-dashoffset: 6;
        }
        54% {
          stroke-dashoffset: 6;
          animation-timing-function: ease-out;
        }
        60% {
          stroke-dashoffset: 0;
          animation-timing-function: linear;
        }
        88% {
          stroke-dashoffset: 0;
          animation-timing-function: ease-in;
        }
        100% {
          stroke-dashoffset: 6;
        }
      }
      @keyframes splash-hline3 {
        0% {
          stroke-dashoffset: 6;
        }
        60% {
          stroke-dashoffset: 6;
          animation-timing-function: ease-out;
        }
        66% {
          stroke-dashoffset: 0;
          animation-timing-function: linear;
        }
        88% {
          stroke-dashoffset: 0;
          animation-timing-function: ease-in;
        }
        100% {
          stroke-dashoffset: 6;
        }
      }
      @keyframes splash-hline4 {
        0% {
          stroke-dashoffset: 6;
        }
        66% {
          stroke-dashoffset: 6;
          animation-timing-function: ease-out;
        }
        72% {
          stroke-dashoffset: 0;
          animation-timing-function: linear;
        }
        88% {
          stroke-dashoffset: 0;
          animation-timing-function: ease-in;
        }
        100% {
          stroke-dashoffset: 6;
        }
      }
      .splash-icon rect,
      .splash-icon path {
        animation: 2.4s infinite;
      }
      .splash-icon rect {
        stroke-dasharray: 72;
        stroke-dashoffset: 72;
        animation-name: splash-rect;
      }
      .splash-icon path:nth-of-type(1) {
        stroke-dasharray: 22;
        stroke-dashoffset: 22;
        animation-name: splash-vline;
      }
      .splash-icon path:nth-of-type(2) {
        stroke-dasharray: 6;
        stroke-dashoffset: 6;
        animation-name: splash-hline1;
      }
      .splash-icon path:nth-of-type(3) {
        stroke-dasharray: 6;
        stroke-dashoffset: 6;
        animation-name: splash-hline2;
      }
      .splash-icon path:nth-of-type(4) {
        stroke-dasharray: 6;
        stroke-dashoffset: 6;
        animation-name: splash-hline3;
      }
      .splash-icon path:nth-of-type(5) {
        stroke-dasharray: 6;
        stroke-dashoffset: 6;
        animation-name: splash-hline4;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div aria-hidden="true">
        <header class="splash-header">mdm</header>
        <div class="splash-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="80px"
            height="80px"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect width="16" height="20" x="4" y="2" rx="2" />
            <path d="M16 2v20" />
            <path d="M2 6h4" />
            <path d="M2 10h4" />
            <path d="M2 14h4" />
            <path d="M2 18h4" />
          </svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
