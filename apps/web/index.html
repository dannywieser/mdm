<!doctype html>
<html lang="en" class="splash-loading">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-96x96.png?v=20260609"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260609" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260609" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png?v=20260609"
    />
    <meta name="apple-mobile-web-app-title" content="mdm" />
    <link rel="manifest" href="/site.webmanifest?v=20260609" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#fbf1c7"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#282a36"
      media="(prefers-color-scheme: dark)"
    />
    <title>mdm</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      :root {
        --splash-bg: #fff;
        --splash-border: #000;
        --splash-text: #000;
        --splash-icon: #000;
      }
      html.splash-loading,
      html.splash-loading body {
        background: var(--splash-bg);
      }
      .splash-shell {
        display: flex;
        flex-direction: column;
        width: 100%;
        min-height: 100dvh;
        box-sizing: border-box;
      }
      .splash-header {
        display: flex;
        align-items: center;
        height: 42px;
        padding: 0 8px;
        border-bottom: 1px solid var(--splash-border);
        color: var(--splash-text);
        font-family: "Anonymous Pro", monospace;
        font-size: 14px;
        font-weight: 600;
      }
      .splash-icon {
        display: flex;
        width: 100%;
        justify-content: center;
        padding-top: 64px;
        color: var(--splash-icon);
        box-sizing: border-box;
      }
      @keyframes splash-pulse {
        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.6;
        }
        50% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .splash-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--splash-icon);
        animation: splash-pulse 1.2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash-shell" aria-hidden="true">
        <header class="splash-header">mdm</header>
        <div class="splash-icon">
          <div class="splash-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
