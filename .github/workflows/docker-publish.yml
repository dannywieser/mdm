name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: notes-api
            dockerfile: infra/docker/notes-api.Dockerfile
            package: apps/notes-api/package.json
          - name: flag-manager
            dockerfile: infra/docker/flag-manager.Dockerfile
            package: apps/flag-manager/package.json
          - name: habit-tracker
            dockerfile: infra/docker/habit-tracker.Dockerfile
            package: apps/habit-tracker/package.json
          - name: image-server
            dockerfile: infra/docker/image-server.Dockerfile
            package: apps/image-server/package.json
          - name: stats-service
            dockerfile: infra/docker/stats-service.Dockerfile
            package: apps/stats-service/package.json
          - name: web
            dockerfile: infra/docker/web.Dockerfile
            package: apps/web/package.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read app version
        id: version
        run: echo "value=$(node -p "require('./${{ matrix.package }}').version")" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: sha
        run: echo "value=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/dannywieser/mdm-${{ matrix.name }}:latest
            ghcr.io/dannywieser/mdm-${{ matrix.name }}:sha-${{ steps.sha.outputs.value }}
            ghcr.io/dannywieser/mdm-${{ matrix.name }}:${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
