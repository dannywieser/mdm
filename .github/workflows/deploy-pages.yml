name: Deploy Demo (GitHub Pages)

on:
  push:
    branches: [main]
  schedule:
    # Regenerate daily so date-relative demo views ($today, $onThisDay,
    # habit streaks) stay populated.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate demo vault and static data snapshot
        run: npm run demo:data

      - name: Build web app in demo mode
        run: |
          export VITE_BASE_PATH="/${GITHUB_REPOSITORY#*/}/"
          npx turbo run build --filter=web
        env:
          VITE_DEMO_MODE: "true"

      - name: Add SPA fallback for client-side routing
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
